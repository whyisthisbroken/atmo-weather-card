    [cite_start]options: # [cite: 12]
        - [cite_start]Google Chrome # [cite: 12]
        - [cite_start]Mozilla Firefox # [cite: 12]
        - [cite_start]Apple Safari # [cite: 12]
        - [cite_start]Microsoft Edge # [cite: 12]
        - [cite_start]Home Assistant Companion App (iOS) # [cite: 12]
        - [cite_start]Home Assistant Companion App (Android) # [cite: 12]
        - [cite_start]Fully Kiosk Browser # [cite: 12]
        - [cite_start]Other # [cite: 12]
    [cite_start]validations: # [cite: 12]
