[cite_start]name: Bug Report # [cite: 1]
[cite_start]description: Report an issue or visual bug # [cite: 1]
[cite_start]body: # [cite: 1]
  - [cite_start]type: markdown # [cite: 1]
    [cite_start]attributes: # [cite: 1]
      value: | [cite_start]# [cite: 1]
        Please complete the troubleshooting steps below before submitting. This helps filter out conflicts with complex layouts or custom themes. [cite_start]# [cite: 2]

        > [!WARNING]
        > **Please make it easy for me to help you.** I develop this card in my free time. Please provide your exact YAML and fill out this form directly—do not submit AI-generated reports with long analyses.
  - [cite_start]type: checkboxes # [cite: 3]
    [cite_start]id: troubleshooting # [cite: 3]
    [cite_start]attributes: # [cite: 3]
      [cite_start]label: Prerequisites & Troubleshooting # [cite: 3]
      description: Please confirm these steps before submitting your issue. [cite_start]# [cite: 3]
    [cite_start]options: # [cite: 4]
        - label: I have read the relevant sections of the README and searched for existing issues. [cite_start]# [cite: 4]
          [cite_start]required: true # [cite: 5]
        - label: I have tested the card isolated as a single card on a brand new, blank dashboard and the issue persists. [cite_start]# [cite: 5]
          [cite_start]required: true # [cite: 6]
        - label: I have temporarily switched to the default Home Assistant theme and the issue persists. [cite_start]# [cite: 6]
          [cite_start]required: true # [cite: 7]
  - [cite_start]type: dropdown # [cite: 7]
    [cite_start]id: theme-type # [cite: 7]
    [cite_start]attributes: # [cite: 7]
      [cite_start]label: Home Assistant Theme # [cite: 7]
      description: What theme are you using when you experience this bug? [cite_start]# [cite: 7]
    [cite_start]options: # [cite: 8]
        - [cite_start]Default Theme (Auto) # [cite: 8]
        - [cite_start]Default Theme (Light) # [cite: 8]
        - [cite_start]Default Theme (Dark) # [cite: 8]
        - [cite_start]Custom Theme # [cite: 8]
    [cite_start]validations: # [cite: 8]
      [cite_start]required: true # [cite: 8]
  - [cite_start]type: textarea # [cite: 8]
    [cite_start]id: bug-description # [cite: 8]
    [cite_start]attributes: # [cite: 8]
      [cite_start]label: Bug Description # [cite: 8]
      description: Clearly describe the issue in your own words. Do NOT paste AI-generated content.
      value: |
        What did you expect to happen, and what actually happened? # [cite: 9]
    [cite_start]validations: # [cite: 10]
      [cite_start]required: true # [cite: 10]
  - [cite_start]type: input # [cite: 10]
    [cite_start]id: card-version # [cite: 10]
    [cite_start]attributes: # [cite: 10]
      [cite_start]label: Card Version # [cite: 10]
